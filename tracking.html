<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Your Order - J.</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; }

        body { background-color: #ffffff; }

        /* Full-width grey header from your screenshot */
        .tracking-header {
            background-color: #f3f0f2; 
            padding: 15px 45px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #e0e0e0;
        }

        .tracking-title {
            font-size: 20px;
            font-weight: 700;
            color: #333;
        }

        /* The specific rounded search bar */
        .search-container {
            position: relative;
            width: 400px;
        }

        .search-input {
            width: 100%;
            padding: 12px 45px 12px 20px;
            border-radius: 25px;
            border: 1px solid #ddd;
            font-size: 14px;
            background: white;
            outline: none;
        }

        .search-icon {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #666;
            cursor: pointer;
        }

        /* Empty body area matching your screenshot */
        .content-area {
            height: 80vh;
        }
    </style>
</head>
<body>

    <div class="tracking-header">
        <div class="tracking-title">Track Your Order</div>
        
        <div class="search-container">
            <input type="text" class="search-input" placeholder="Enter Order ID or Tracking Number">
            <div class="search-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
            </div>
        </div>
    </div>

    <div class="content-area"></div>

</body>
</html>
